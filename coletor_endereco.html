<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Coletor de Endereçamento</title>

<!-- PWA: instalar com ícone na tela inicial -->
<link rel="manifest" href="manifest-endereco.json">
<meta name="theme-color" content="#059669">
<link rel="icon" href="icons/endereco-192.png">
<link rel="apple-touch-icon" href="icons/endereco-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Endereçamento">

<style>
:root{
  --bg:#f0faf6;
  --card:#ffffff;
  --surface:#f8fffe;
  --text:#111827;
  --muted:#6b7280;
  --subtle:#9ca3af;
  --line:#e5e7eb;
  --line2:#d1fae5;
  --green:#059669;
  --green-light:#d1fae5;
  --green-dark:#047857;
  --danger:#dc2626;
  --danger-bg:#fef2f2;
  --warn:#b45309;
  --warn-bg:#fffbeb;
  --info:#1d4ed8;
  --info-bg:#eff6ff;
  --radius-lg:16px;
  --radius-md:10px;
  --radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:20px 14px 48px;
  font-size:15px;
  line-height:1.5;
}
.wrap{width:min(480px,100%);}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius-lg);
  box-shadow:0 1px 4px rgba(0,0,0,.06),0 4px 24px rgba(0,0,0,.05);
  overflow:hidden;
}
.header{
  padding:16px 20px;
  display:flex;
  align-items:center;
  gap:12px;
  border-bottom:1px solid var(--line);
  background:#fff;
}
.appIcon{
  width:38px;height:38px;border-radius:10px;background:var(--green-light);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.appIcon svg{width:20px;height:20px;stroke:var(--green-dark);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.appName{font-weight:700;font-size:15px;color:var(--text)}
.appSub{font-size:12px;color:var(--muted)}
.sessionCount{margin-left:auto;text-align:right;font-size:11px;color:var(--muted)}
.sessionCount b{display:block;font-size:18px;color:var(--green-dark);line-height:1.1}

.tabBar{display:flex;border-bottom:1px solid var(--line);background:#fff}
.tabBtn{
  flex:1;padding:12px 8px;background:none;border:none;cursor:pointer;
  font-size:13px;font-weight:600;color:var(--muted);border-bottom:2.5px solid transparent;
}
.tabBtn.active{color:var(--green-dark);border-bottom-color:var(--green)}

.body{padding:20px}
.step{display:none}
.step.active{display:block}
.view{display:none}
.view.active{display:block}

.label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px;display:block}
.inputField{
  width:100%;height:48px;padding:0 14px;
  border:1.5px solid var(--line);border-radius:var(--radius-sm);
  background:#fff;font-size:17px;color:var(--text);outline:none;
  transition:border-color .15s,background .15s;
}
.inputField:focus{border-color:var(--green);background:#fafffe}
.hint{font-size:12px;color:var(--subtle);margin-top:6px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.btn{
  width:100%;height:48px;border-radius:var(--radius-sm);border:1.5px solid transparent;
  font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-primary{background:var(--green);color:#fff;margin-top:14px}
.btn-primary:active{background:var(--green-dark)}
.btn-primary:disabled{opacity:.5;cursor:default}
.btn-ghost{background:#fff;color:var(--text);border-color:var(--line);margin-top:10px}

.itemBox{
  background:var(--surface);border:1px solid var(--line2);border-radius:var(--radius-md);
  padding:14px;margin-bottom:16px;
}
.itemBox .desc{font-weight:700;font-size:14px;margin-bottom:6px}
.itemBox .meta{font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:10px}
.itemBox .meta span{display:flex;align-items:center;gap:4px}

.matchList{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.matchCard{
  background:#fff;border:1.5px solid var(--line);border-radius:var(--radius-md);
  padding:12px 14px;cursor:pointer;transition:border-color .15s;
}
.matchCard:active{border-color:var(--green)}
.matchCard .desc{font-weight:600;font-size:13px;margin-bottom:4px}
.matchCard .meta{font-size:11.5px;color:var(--muted)}

.msg{border-radius:var(--radius-md);padding:12px 14px;font-size:13px;margin-top:14px;display:none}
.msg.ok{display:block;background:var(--green-light);color:var(--green-dark);border:1px solid #a7f3d0}
.msg.err{display:block;background:var(--danger-bg);color:#991b1b;border:1px solid #fecaca}
.msg.info{display:block;background:var(--info-bg);color:#1e3a8a;border:1px solid #bfdbfe}
.msg.warn{display:block;background:var(--warn-bg);color:#92400e;border:1px solid #fde68a}

.footerBar{
  padding:12px 20px;border-top:1px solid var(--line);background:var(--surface);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.footerBar .hint{margin:0}
.refreshBtn{
  font-size:12px;color:var(--green-dark);background:none;border:none;cursor:pointer;
  display:flex;align-items:center;gap:5px;font-weight:600;padding:4px;
}
.refreshBtn:disabled{opacity:.5}
.refreshBtn svg{width:13px;height:13px}

.summaryRow{display:flex;justify-content:space-between;font-size:13px;padding:7px 0;border-bottom:1px dashed var(--line)}
.summaryRow:last-child{border-bottom:none}
.summaryRow .k{color:var(--muted)}
.summaryRow .v{font-weight:600;text-align:right}

.spinner{
  display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.5);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.inputRow{display:flex;gap:8px}
.inputRow .inputField{flex:1}
.btn-scan{
  width:48px;height:48px;flex-shrink:0;border-radius:var(--radius-sm);
  background:var(--green);color:#fff;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.btn-scan:active{background:var(--green-dark)}
.btn-scan svg{width:20px;height:20px}

/* ── Scanner de câmera ── */
.scanOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:400;align-items:center;justify-content:center;padding:16px}
.scanOverlay.show{display:flex}
.scanModal{background:#111;border-radius:var(--radius-lg);width:min(440px,100%);overflow:hidden}
.scanHeader{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;color:#eee;font-size:13px;font-weight:600}
.scanHeader .iconBtn{background:none;border:none;color:#ccc;cursor:pointer;padding:4px}
.scanHeader .iconBtn svg{width:18px;height:18px;fill:none;stroke:#ccc;stroke-width:2}
#scanReader{width:100%;background:#000;min-height:220px}
#scanReader video{width:100%!important;object-fit:cover}
#scanReader img{display:none!important}
.scanHint{color:#aaa;font-size:13px;text-align:center;padding:10px 16px 14px}

/* ── Dashboard de posições (Consultar endereço) ── */
.ruaChips{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:2px}
.ruaChip{
  flex-shrink:0;padding:8px 16px;border-radius:99px;border:1.5px solid var(--line);
  background:#fff;font-weight:700;font-size:14px;cursor:pointer;color:var(--text);
}
.ruaChip.active{background:var(--green);color:#fff;border-color:var(--green-dark)}

.posList{display:flex;flex-direction:column;gap:7px;max-height:58vh;overflow-y:auto;padding-right:2px}
.posRow{
  display:flex;align-items:center;gap:10px;border-radius:var(--radius-md);padding:9px 11px;
  border:1.5px solid var(--line2);background:var(--surface);
}
.posRow.occ{border-color:#fecaca;background:#fff8f8}
.posRow.hide{display:none}
.posNum{
  width:32px;height:32px;border-radius:8px;background:#fff;border:1.5px solid var(--green);color:var(--green-dark);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12.5px;flex-shrink:0;
}
.posRow.occ .posNum{border-color:var(--danger);color:var(--danger)}
.posInfo{flex:1;min-width:0}
.posInfo .desc{font-weight:600;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.posInfo .meta{font-size:10.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.posFreeLabel{font-size:12.5px;color:var(--green-dark);font-weight:600}
.posBadge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;flex-shrink:0;white-space:nowrap}
.posRow:not(.occ) .posBadge{background:var(--green-light);color:var(--green-dark)}
.posRow.occ .posBadge{background:var(--danger-bg);color:var(--danger)}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">

    <div class="header">
      <div class="appIcon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M12 21s-7-6.5-7-11a7 7 0 0114 0c0 4.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>
      </div>
      <div>
        <div class="appName">Coletor de Endereçamento</div>
        <div class="appSub">Humana Alimentar</div>
      </div>
      <div class="sessionCount"><b id="sessionCount">0</b>hoje</div>
    </div>

    <div class="tabBar">
      <button class="tabBtn active" id="tabEnderecar" data-view="viewEnderecar">📦 Endereçar / Transferir</button>
      <button class="tabBtn" id="tabConsultar" data-view="viewConsultar">📍 Consultar endereço</button>
    </div>

    <div class="body">

      <!-- VIEW: ENDEREÇAR / TRANSFERIR ============================== -->
      <div class="view active" id="viewEnderecar">

        <!-- STEP 1: buscar produto -->
        <div class="step active" id="step1">
          <label class="label" for="skuIn">Código do produto (SKU ou EAN)</label>
          <div class="inputRow">
            <input class="inputField" id="skuIn" inputmode="text" autocomplete="off" placeholder="Ex: 2155" autofocus>
            <button class="btn-scan" id="scanBtn" title="Escanear com câmera" aria-label="Escanear código de barras">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>
            </button>
          </div>
          <div class="hint">Toque na câmera para escanear, ou use um leitor físico (envia Enter automaticamente)</div>
          <div class="row2">
            <button class="btn btn-primary" id="btnBuscarSku" style="margin-top:10px">Buscar</button>
            <button class="btn btn-ghost" id="btnLimparBusca">✕ Limpar</button>
          </div>

          <div id="matchList" class="matchList"></div>
          <div id="step1Msg" class="msg"></div>
          <button class="btn btn-ghost" id="btnNovaConsulta" style="display:none">↻ Nova consulta</button>
        </div>

        <!-- OVERLAY SCANNER -->
        <div class="scanOverlay" id="scanOverlay" role="dialog" aria-modal="true" aria-label="Scanner de código de barras">
          <div class="scanModal">
            <div class="scanHeader">
              <span>Escanear código de barras</span>
              <button class="iconBtn" id="scanClose" aria-label="Fechar scanner">
                <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
              </button>
            </div>
            <div id="scanReader"></div>
            <p class="scanHint" id="scanHint">Aponte a câmera para o código de barras</p>
          </div>
        </div>

        <!-- STEP 2: escolher destino -->
        <div class="step" id="step2">
          <div class="itemBox" id="itemBoxDestino"></div>

          <label class="label" id="ruaLabel" for="ruaIn">Rua de destino</label>
          <input class="inputField" id="ruaIn" inputmode="text" autocomplete="off" placeholder="Ex: A" maxlength="2" style="text-transform:uppercase">

          <div style="height:10px"></div>

          <label class="label" id="posLabel" for="posIn">Posição de destino</label>
          <input class="inputField" id="posIn" inputmode="numeric" autocomplete="off" placeholder="Ex: 12">

          <div id="step2Msg" class="msg"></div>

          <button class="btn btn-primary" id="btnToConfirm">Confirmar destino →</button>
          <button class="btn btn-ghost" id="btnBack1">← Buscar outro item</button>
        </div>

        <!-- STEP 3: confirmar e enviar -->
        <div class="step" id="step3">
          <div class="itemBox" id="itemBoxConfirm"></div>
          <div id="step3Msg" class="msg"></div>
          <button class="btn btn-primary" id="btnConfirmSend">✓ Confirmar Endereçamento</button>
          <button class="btn btn-ghost" id="btnBack2">← Voltar</button>
        </div>

      </div>

      <!-- VIEW: CONSULTAR ENDEREÇO =================================== -->
      <div class="view" id="viewConsultar">
        <div class="ruaChips" id="ruaChips"></div>
        <div class="inputRow" style="margin-bottom:12px">
          <input class="inputField" id="dashFiltro" autocomplete="off" placeholder="Filtrar por SKU, descrição ou posição">
          <button class="btn-scan" id="btnLimparFiltro" title="Limpar filtro" aria-label="Limpar filtro" style="background:#fff;border:1.5px solid var(--line);color:var(--muted)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div id="posList" class="posList"></div>
      </div>

    </div>

    <div class="footerBar">
      <span class="hint" id="pendingCountHint">Carregando estoque…</span>
      <button class="refreshBtn" id="btnRefresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        Atualizar
      </button>
    </div>

  </div>
</div>

<script>
// ── Config da API do ERP (mesmos valores usados no WMS principal) ──────────
const ERP_STOCK_URL   = 'https://gestao.humanaalimentar.com.br/erp/api/v1/human/crud-stock/index.php';
const ERP_STOCK_TOKEN = 'WMS-TOKEN-STOCK-2026';
const ERP_PROXY       = 'https://corsproxy.io/?';

function _erpUrl(extraQs = '') {
  return `${ERP_STOCK_URL}?token=${ERP_STOCK_TOKEN}${extraQs}`;
}

async function erpGetEstoque() {
  const today = new Date().toISOString().slice(0, 10);
  const targetUrl = `${_erpUrl()}&data_limite=${today}&_=${Date.now()}`;
  const resp = await fetch(ERP_PROXY + encodeURIComponent(targetUrl));
  if (!resp.ok) throw new Error(`Erro HTTP ${resp.status} ao consultar o ERP.`);
  const data = await resp.json();
  if (!Array.isArray(data)) throw new Error('Resposta inesperada do ERP.');
  return data;
}

async function erpWrite(method, payload) {
  const resp = await fetch(ERP_PROXY + encodeURIComponent(_erpUrl()), {
    method,
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify(payload),
    signal:  AbortSignal.timeout(15000)
  });
  let data = null;
  try { data = await resp.json(); } catch(_) {}
  if (!resp.ok || (data && data.sucesso === false)) {
    throw new Error((data && data.mensagem) || `HTTP ${resp.status}`);
  }
  return data || {};
}
const erpCreateEndereco = payload => erpWrite('POST', payload);
const erpUpdateEndereco = payload => erpWrite('PUT', payload);

function brDate(iso) {
  if (!iso) return '–';
  const p = String(iso).split('-');
  return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : iso;
}

// ── Estado ───────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
let estoqueAtual = [];
let selecionado = null;       // registro do ERP escolhido
let modoTransferencia = false; // true = item já endereçado (PUT) | false = pendente novo (POST)
let sessionCount = 0;

function showStep(n) {
  ['step1','step2','step3'].forEach((id, i) => $(id).classList.toggle('active', i === n - 1));
}

function showMsg(elId, type, text) {
  const el = $(elId);
  el.className = 'msg ' + type;
  el.textContent = text;
}

function hideMsg(elId) {
  $(elId).className = 'msg';
  $(elId).textContent = '';
}

function atualizarContagemHint() {
  const pendentesCount = estoqueAtual.filter(r => !r.rua && !r.posicao).length;
  $('pendingCountHint').textContent = `${estoqueAtual.length} itens no estoque · ${pendentesCount} pendentes`;
}

async function carregarEstoque() {
  const btn = $('btnRefresh');
  btn.disabled = true;
  $('pendingCountHint').textContent = 'Atualizando…';
  try {
    estoqueAtual = await erpGetEstoque();
    atualizarContagemHint();
  } catch (e) {
    $('pendingCountHint').textContent = 'Falha ao carregar estoque';
    showMsg('step1Msg', 'err', 'Erro ao consultar o ERP: ' + e.message);
  }
  btn.disabled = false;
}

function buscarSku(sku) {
  hideMsg('step1Msg');
  $('matchList').innerHTML = '';
  const skuNorm = sku.trim();
  if (!skuNorm) {
    showMsg('step1Msg', 'warn', 'Informe ou escaneie o código do produto.');
    return;
  }

  // Busca em todo o estoque (pendentes e já endereçados) — aceita SKU interno ou EAN
  const matches = estoqueAtual.filter(r =>
    String(r.item_codigo || '').trim() === skuNorm ||
    String(r.item_ean13  || '').trim() === skuNorm
  );

  if (matches.length === 0) {
    showMsg('step1Msg', 'warn', `Nenhum item encontrado com o código "${skuNorm}". Confira o código ou atualize a lista.`);
    $('btnNovaConsulta').style.display = '';
    return;
  }
  if (matches.length === 1) {
    selecionarItem(matches[0]);
    return;
  }
  // múltiplos lotes/posições do mesmo produto — pede pra escolher
  $('matchList').innerHTML = matches.map((m, i) => {
    const statusTxt = (m.rua && m.posicao) ? `Em ${m.rua} · Pos. ${m.posicao}` : 'Pendente (sem endereço)';
    return `
    <div class="matchCard" data-idx="${i}">
      <div class="desc">${m.item_descricao || '–'}</div>
      <div class="meta">Lote ${m.numero_lote || '–'} · Val. ${brDate(m.dt_validade)} · Saldo ${m.saldo_aberto || '–'} · ${statusTxt}</div>
    </div>`;
  }).join('');
  $('matchList').querySelectorAll('[data-idx]').forEach(card => {
    card.addEventListener('click', () => selecionarItem(matches[parseInt(card.dataset.idx)]));
  });
  $('btnNovaConsulta').style.display = '';
}

function limparBusca() {
  $('skuIn').value = '';
  $('matchList').innerHTML = '';
  hideMsg('step1Msg');
  $('btnNovaConsulta').style.display = 'none';
  $('skuIn').focus();
}

function selecionarItem(item) {
  selecionado = item;
  modoTransferencia = !!(item.rua && item.posicao);

  const statusLine = modoTransferencia
    ? `<div class="summaryRow"><span class="k">Endereço atual</span><span class="v">${item.rua} · Pos. ${item.posicao}</span></div>`
    : `<div class="summaryRow"><span class="k">Status</span><span class="v">Pendente (sem endereço)</span></div>`;

  $('itemBoxDestino').innerHTML = `
    <div class="desc">${item.item_descricao || '–'}</div>
    <div class="meta">
      <span>SKU ${item.item_codigo || '–'}</span>
      <span>Lote ${item.numero_lote || '–'}</span>
      <span>Val. ${brDate(item.dt_validade)}</span>
      <span>Saldo ${item.saldo_aberto || '–'}</span>
    </div>
    ${statusLine}`;

  $('ruaLabel').textContent = modoTransferencia ? 'Nova rua de destino' : 'Rua de destino';
  $('posLabel').textContent = modoTransferencia ? 'Nova posição de destino' : 'Posição de destino';

  $('ruaIn').value = '';
  $('posIn').value = '';
  hideMsg('step2Msg');
  showStep(2);
  $('ruaIn').focus();
}

function irParaConfirmacao() {
  const rua = $('ruaIn').value.trim().toUpperCase();
  const pos = $('posIn').value.trim();
  if (!rua || !pos) {
    showMsg('step2Msg', 'warn', 'Informe a rua e a posição de destino.');
    return;
  }
  if (modoTransferencia && rua === String(selecionado.rua).toUpperCase() && pos === String(selecionado.posicao)) {
    showMsg('step2Msg', 'warn', 'Destino igual ao endereço atual. Escolha um endereço diferente.');
    return;
  }
  hideMsg('step2Msg');

  const acaoLabel = modoTransferencia ? 'Transferência' : 'Novo endereço';
  const origemRow = modoTransferencia
    ? `<div class="summaryRow"><span class="k">De</span><span class="v">${selecionado.rua} · Pos. ${selecionado.posicao}</span></div>`
    : '';

  $('itemBoxConfirm').innerHTML = `
    <div class="desc">${selecionado.item_descricao || '–'}</div>
    <div class="summaryRow"><span class="k">Ação</span><span class="v">${acaoLabel}</span></div>
    <div class="summaryRow"><span class="k">SKU</span><span class="v">${selecionado.item_codigo || '–'}</span></div>
    <div class="summaryRow"><span class="k">Lote</span><span class="v">${selecionado.numero_lote || '–'}</span></div>
    <div class="summaryRow"><span class="k">Validade</span><span class="v">${brDate(selecionado.dt_validade)}</span></div>
    <div class="summaryRow"><span class="k">Saldo</span><span class="v">${selecionado.saldo_aberto || '–'}</span></div>
    ${origemRow}
    <div class="summaryRow"><span class="k">Para</span><span class="v">${rua} · Pos. ${pos}</span></div>
  `;
  hideMsg('step3Msg');
  showStep(3);
}

async function confirmarEnvio() {
  const rua = $('ruaIn').value.trim().toUpperCase();
  const pos = $('posIn').value.trim();
  const btn = $('btnConfirmSend');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Enviando…';
  hideMsg('step3Msg');

  try {
    let okMsg;
    if (modoTransferencia) {
      await erpUpdateEndereco({
        id_item_enderecamento: selecionado.id_item_enderecamento,
        rua,
        posicao: pos
      });
      selecionado.rua = rua;
      selecionado.posicao = pos;
      okMsg = `Transferido com sucesso para Rua ${rua} · Pos. ${pos}.`;
    } else {
      const result = await erpCreateEndereco({
        item_id:       selecionado.item_id,
        unidade_id:    selecionado.empresa_id,
        estoque:       selecionado.saldo_aberto || undefined,
        rua,
        posicao:       pos,
        lote:          selecionado.numero_lote || undefined,
        data_validade: selecionado.dt_validade || undefined
      });
      selecionado.rua = rua;
      selecionado.posicao = pos;
      if (result.id_item_enderecamento) selecionado.id_item_enderecamento = result.id_item_enderecamento;
      okMsg = `Endereçado com sucesso! ID ${result.id_item_enderecamento || '–'} · Rua ${rua} · Pos. ${pos}.`;
    }

    atualizarContagemHint();
    sessionCount++;
    $('sessionCount').textContent = sessionCount;

    showMsg('step3Msg', 'ok', okMsg);
    btn.disabled = false;
    btn.innerHTML = '✓ Confirmar Endereçamento';

    setTimeout(() => {
      showStep(1);
      limparBusca();
      hideMsg('step3Msg');
    }, 1400);
  } catch (e) {
    showMsg('step3Msg', 'err', 'Falha ao enviar ao ERP: ' + e.message);
    btn.disabled = false;
    btn.innerHTML = '✓ Confirmar Endereçamento';
  }
}

// ── Dashboard de posições (Consultar endereço) ──────────────────────────────
const RUAS  = ['A','B','C','D','E','F','G'];
const POSES = Array.from({ length: 40 }, (_, i) => i + 1);
let ruaAtiva = 'A';

function renderRuaChips() {
  $('ruaChips').innerHTML = RUAS.map(r =>
    `<button class="ruaChip ${r === ruaAtiva ? 'active' : ''}" data-rua="${r}">${r}</button>`
  ).join('');
  $('ruaChips').querySelectorAll('[data-rua]').forEach(chip => {
    chip.addEventListener('click', () => {
      ruaAtiva = chip.dataset.rua;
      renderRuaChips();
      renderPosList();
    });
  });
}

function renderPosList() {
  const filtro = $('dashFiltro').value.trim().toLowerCase();
  const itensRua = estoqueAtual.filter(r => String(r.rua || '').trim().toUpperCase() === ruaAtiva);

  $('posList').innerHTML = POSES.map(pos => {
    const itens = itensRua.filter(r => String(r.posicao || '').trim() === String(pos));
    const isFree = itens.length === 0;

    if (filtro) {
      const bate = String(pos).includes(filtro) || itens.some(it =>
        (it.item_codigo || '').toLowerCase().includes(filtro) ||
        (it.item_descricao || '').toLowerCase().includes(filtro)
      );
      if (!bate) return '';
    }

    if (isFree) {
      return `<div class="posRow">
        <div class="posNum">${pos}</div>
        <div class="posInfo"><span class="posFreeLabel">Livre</span></div>
        <span class="posBadge">Livre</span>
      </div>`;
    }
    const descs = itens.map(it => it.item_descricao || '–').join(' + ');
    const metas = itens.map(it => `SKU ${it.item_codigo || '–'} · Lote ${it.numero_lote || '–'} · Saldo ${it.saldo_aberto || '–'}`).join(' / ');
    return `<div class="posRow occ">
      <div class="posNum">${pos}</div>
      <div class="posInfo">
        <div class="desc">${descs}</div>
        <div class="meta">${metas}</div>
      </div>
      <span class="posBadge">${itens.length > 1 ? itens.length + ' itens' : 'Ocupado'}</span>
    </div>`;
  }).join('');
}

$('dashFiltro').addEventListener('input', renderPosList);
$('btnLimparFiltro').addEventListener('click', () => {
  $('dashFiltro').value = '';
  renderPosList();
  $('dashFiltro').focus();
});

// ── Scanner de câmera (mesmo padrão usado no index.html) ────────────────────
let _scanner = null;

function _onBarcodeDetected(code) {
  closeScan();
  const val = String(code || '').trim();
  if (!val) return;
  $('skuIn').value = val;
  buscarSku(val);
}

async function openScan() {
  $('scanOverlay').classList.add('show');
  $('scanHint').textContent = 'Iniciando câmera...';

  // Tenta BarcodeDetector nativo primeiro (Chrome Android)
  if (typeof BarcodeDetector !== 'undefined') {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      const video = document.createElement('video');
      video.srcObject = stream; video.autoplay = true; video.muted = true; video.playsInline = true;
      $('scanReader').innerHTML = ''; $('scanReader').appendChild(video);
      await video.play();
      const det = new BarcodeDetector({ formats: ['ean_13','ean_8','code_128','code_39','upc_a','upc_e','itf'] });
      $('scanHint').textContent = 'Aponte para o código de barras';
      _scanner = { type: 'native', stream, active: true };
      const loop = async () => {
        if (!_scanner?.active) return;
        try {
          const res = await det.detect(video);
          if (res.length) { _onBarcodeDetected(res[0].rawValue); return; }
        } catch {}
        requestAnimationFrame(loop);
      };
      requestAnimationFrame(loop);
      return;
    } catch (e) { /* sem câmera nativa — tenta html5-qrcode */ }
  }

  // Fallback: html5-qrcode (carregado sob demanda)
  if (!window.Html5Qrcode) {
    $('scanHint').textContent = 'Carregando leitor...';
    try {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    } catch (e) {
      $('scanHint').textContent = 'Não foi possível carregar o leitor. Use o leitor físico ou digite.';
      return;
    }
  }
  try {
    const qr = new Html5Qrcode('scanReader');
    _scanner = { type: 'html5', qr, active: true };
    await qr.start(
      { facingMode: 'environment' },
      { fps: 15, qrbox: { width: 260, height: 100 } },
      (code) => { _onBarcodeDetected(code); }
    );
    $('scanHint').textContent = 'Aponte para o código de barras';
  } catch (e) {
    $('scanHint').textContent = 'Câmera indisponível. Use o leitor físico ou digite.';
  }
}

async function closeScan() {
  $('scanOverlay').classList.remove('show');
  const sc = _scanner; _scanner = null;
  if (!sc) return;
  sc.active = false;
  if (sc.type === 'native') {
    sc.stream?.getTracks().forEach(t => t.stop());
    $('scanReader').innerHTML = '';
  } else if (sc.type === 'html5') {
    try { await sc.qr.stop(); } catch {}
  }
}

$('scanBtn').addEventListener('click', openScan);
$('scanClose').addEventListener('click', closeScan);
$('scanOverlay').addEventListener('click', e => { if (e.target === $('scanOverlay')) closeScan(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && $('scanOverlay').classList.contains('show')) closeScan();
});
if (!navigator.mediaDevices?.getUserMedia) {
  const sb = $('scanBtn'); if (sb) sb.style.display = 'none';
}

// ── Tabs (Endereçar/Transferir x Consultar) ─────────────────────────────────
function switchView(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === viewId));
  document.querySelectorAll('.tabBtn').forEach(b => b.classList.toggle('active', b.dataset.view === viewId));
  if (viewId === 'viewConsultar') renderPosList();
}
$('tabEnderecar').addEventListener('click', () => switchView('viewEnderecar'));
$('tabConsultar').addEventListener('click', () => switchView('viewConsultar'));

// ── Listeners ────────────────────────────────────────────────────────────────
$('skuIn').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); buscarSku($('skuIn').value); }
});
$('btnBuscarSku').addEventListener('click', () => buscarSku($('skuIn').value));
$('btnLimparBusca').addEventListener('click', limparBusca);
$('btnNovaConsulta').addEventListener('click', limparBusca);

$('ruaIn').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); $('posIn').focus(); }
});
$('posIn').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); irParaConfirmacao(); }
});

$('btnToConfirm').addEventListener('click', irParaConfirmacao);
$('btnConfirmSend').addEventListener('click', confirmarEnvio);

$('btnBack1').addEventListener('click', () => {
  selecionado = null;
  showStep(1);
  limparBusca();
});
$('btnBack2').addEventListener('click', () => showStep(2));

$('btnRefresh').addEventListener('click', async () => {
  await carregarEstoque();
  renderPosList();
});

// ── Init ─────────────────────────────────────────────────────────────────────
renderRuaChips();
carregarEstoque().then(renderPosList);
$('skuIn').focus();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw-endereco.js').catch(() => {});
}
</script>
